<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kayıt Ol – NoteApp</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />

    <style>
        :root {
            --bg: linear-gradient(135deg, #eef3e8 0%, #f7f7f2 100%);
            --card: rgba(255, 255, 255, 0.72);
            --text: #24313d;
            --muted: #7c8694;
            --primary: linear-gradient(135deg, #2ea89b 0%, #9ca87b 100%);
            --shadow: 0 10px 30px rgba(71, 97, 78, 0.08),
                0 2px 10px rgba(0, 0, 0, 0.04);
            --border: rgba(255, 255, 255, 0.6);
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: system-ui;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            overflow-y: auto;
            position: relative;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            width: 320px;
            height: 320px;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: .35;
        }

        body::before {
            background: #8fd3c7;
            top: -120px;
            left: -100px;
        }

        body::after {
            background: #d8d2a7;
            bottom: -120px;
            right: -100px;
        }

        .wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1rem;
        }

        .card-register {
            width: 100%;
            max-width: 430px;
            background: var(--card);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 34px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            overflow: hidden;
            position: relative;
        }

        .card-register::before {
            content: "";
            position: absolute;
            top: -100px;
            right: -100px;
            width: 220px;
            height: 220px;
            background: rgba(143, 211, 199, 0.25);
            border-radius: 50%;
            filter: blur(50px);
        }

        .header {
            text-align: center;
            padding: 2.2rem 2rem 1rem;
        }

        .logo {
            width: 74px;
            height: 74px;
            margin: 0 auto 1.2rem;
            border-radius: 24px;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: white;
            box-shadow: 0 10px 25px rgba(46, 168, 155, 0.22);
        }

        .title {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: .4rem;
        }

        .subtitle {
            color: var(--muted);
            font-size: .95rem;
        }

        .form-area {
            padding: 2rem;
        }

        .form-label {
            font-weight: 700;
            margin-bottom: 10px;
        }

        .input-wrap {
            position: relative;
            margin-bottom: 1rem;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }

        .input-custom {
            width: 100%;
            padding: 15px 18px 15px 48px;
            border: 1px solid rgba(36, 49, 61, 0.15);
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(10px);
            border-radius: 18px;
            outline: none;
            transition: .2s ease;
            color: #24313d;
        }

        .input-custom:focus {
            box-shadow: 0 0 0 4px rgba(46, 168, 155, 0.12);
            border-color: rgba(46, 168, 155, 0.4);
        }

        .btn-register {
            width: 100%;
            border: none;
            border-radius: 18px;
            padding: 15px;
            font-weight: 700;
            background: var(--primary);
            color: white;
            margin-top: 1rem;
            box-shadow: 0 10px 25px rgba(46, 168, 155, 0.25);
            transition: .25s ease;
        }

        .btn-register:hover {
            transform: translateY(-3px);
        }

        footer {
            text-align: center;
            padding: 1rem;
            color: var(--muted);
            font-size: .85rem;
        }
    </style>
</head>

<body>

    <div class="wrapper">

        <div class="card-register">

            <div class="header">

                <div class="logo">
                    <i class="bi bi-person-plus"></i>
                </div>

                <h1 class="title">Hesap Oluştur</h1>
                <p class="subtitle">Notlarını kaydetmek için bir hesap oluştur ✨</p>

            </div>

            <div class="form-area">

                {% if error %}
                <div class="alert alert-danger">
                    {{ error }}
                </div>
                {% endif %}

                <form method="POST">

                    {% csrf_token %}

                    <label class="form-label">Kullanıcı Adı</label>
                    <div class="input-wrap">
                        <i class="bi bi-person input-icon"></i>
                        <input type="text" name="username" class="input-custom" required>
                    </div>


                    <label class="form-label">Şifre</label>
                    <div class="input-wrap">
                        <i class="bi bi-lock input-icon"></i>
                        <input type="password" name="password1" class="input-custom" required>
                    </div>

                    <label class="form-label">Şifre Tekrar</label>
                    <div class="input-wrap">
                        <i class="bi bi-lock input-icon"></i>
                        <input type="password" name="password2" class="input-custom" required>
                    </div>

                    <button type="submit" class="btn-register">
                        Kayıt Ol
                    </button>

                </form>

                <div class="text-center mt-3" style="color:#7c8694;">
                    Zaten hesabın var mı?
                    <a href="{% url 'login' %}" style="color:#2ea89b; font-weight:700;">
                        Giriş Yap
                    </a>
                </div>

            </div>

        </div>

    </div>

    <footer>
        © 2026 NoteApp
    </footer>

</body>

</html>
