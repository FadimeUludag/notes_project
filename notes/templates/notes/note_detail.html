<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Not Detayı – NoteApp</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />

    <style>
        :root {

            --bg: linear-gradient(135deg, #eef3e8 0%, #f7f7f2 100%);

            --card: rgba(255, 255, 255, 0.72);

            --text: #24313d;
            --muted: #7c8694;

            --primary: linear-gradient(135deg, #2ea89b 0%, #9ca87b 100%);

            --shadow:
                0 10px 30px rgba(71, 97, 78, 0.08),
                0 2px 10px rgba(0, 0, 0, 0.04);

            --border: rgba(255, 255, 255, 0.6);
        }

        * {
            box-sizing: border-box;
        }

        body {

            background: var(--bg);

            min-height: 100vh;

            font-family: system-ui;

            color: var(--text);

            display: flex;
            flex-direction: column;

            overflow-x: hidden;

            position: relative;
        }

        /* BACKGROUND BLOBS */
        body::before,
        body::after {

            content: "";

            position: fixed;

            width: 320px;
            height: 320px;

            border-radius: 50%;

            filter: blur(80px);

            z-index: -1;

            opacity: .35;
        }

        body::before {

            background: #8fd3c7;

            top: -120px;
            left: -100px;
        }

        body::after {

            background: #d8d2a7;

            bottom: -120px;
            right: -100px;
        }

        /* NAVBAR */
        .navbar-custom {

            padding: 1.2rem 0;

            background: rgba(255, 255, 255, 0.55);

            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);

            border-bottom: 1px solid rgba(255, 255, 255, 0.5);

            box-shadow: var(--shadow);

            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-brand-custom {

            font-size: 1.5rem;

            font-weight: 800;

            color: #1e293b;

            text-decoration: none;

            display: flex;
            align-items: center;
            gap: .7rem;
        }

        .brand-icon {

            width: 46px;
            height: 46px;

            border-radius: 16px;

            background: var(--primary);

            display: flex;
            align-items: center;
            justify-content: center;

            color: white;

            font-size: 1.2rem;

            box-shadow:
                0 10px 25px rgba(46, 168, 155, 0.22);
        }

        /* PAGE */
        .page-wrapper {

            flex: 1;

            padding: 3rem 1rem 4rem;

            display: flex;
            justify-content: center;
        }

        .content-col {

            width: 100%;
            max-width: 820px;
        }

        /* ACTIONS */
        .top-actions {

            display: flex;
            justify-content: space-between;
            align-items: center;

            flex-wrap: wrap;

            gap: 1rem;

            margin-bottom: 1.8rem;
        }

        .action-group {

            display: flex;
            gap: .8rem;
        }

        .btn-back,
        .btn-edit,
        .btn-delete {

            border: none;

            padding: 13px 18px;

            border-radius: 18px;

            font-weight: 700;

            text-decoration: none;

            transition: .2s ease;
        }

        .btn-back {

            background: rgba(255, 255, 255, 0.7);

            border: 1px solid rgba(255, 255, 255, 0.8);

            color: var(--text);

            backdrop-filter: blur(12px);
        }

        .btn-back:hover {

            background: white;

            color: var(--text);
        }

        .btn-edit {

            background: rgba(46, 168, 155, 0.12);

            color: #22877d;

            border: 1px solid rgba(46, 168, 155, 0.18);
        }

        .btn-edit:hover {
            background: rgba(46, 168, 155, 0.2);
        }

        .btn-delete {

            background: rgba(255, 107, 107, 0.12);

            color: #d64545;

            border: 1px solid rgba(255, 107, 107, 0.18);
        }

        .btn-delete:hover {
            background: rgba(255, 107, 107, 0.2);
        }

        /* NOTE CARD */
        .note-card {

            background: var(--card);

            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);

            border-radius: 34px;

            border: 1px solid var(--border);

            box-shadow: var(--shadow);

            overflow: hidden;

            position: relative;
        }

        /* GLOW */
        .note-card::before {

            content: "";

            position: absolute;

            top: -100px;
            right: -100px;

            width: 220px;
            height: 220px;

            background: rgba(143, 211, 199, 0.25);

            border-radius: 50%;

            filter: blur(50px);
        }

        .note-body {

            padding: 2.7rem;

            position: relative;
            z-index: 2;
        }

        /* CATEGORY */
        .note-category {

            display: inline-flex;

            background: rgba(46, 168, 155, 0.12);

            color: #22877d;

            border: 1px solid rgba(46, 168, 155, 0.18);

            padding: .45rem .9rem;

            border-radius: 50px;

            font-size: .82rem;

            font-weight: 700;

            margin-bottom: 1.3rem;
        }

        /* TITLE */
        .note-title {

            font-size: 2.5rem;

            font-weight: 800;

            color: #1e293b;

            margin-bottom: 1.3rem;

            line-height: 1.15;
        }

        /* META */
        .meta-row {

            display: flex;

            flex-wrap: wrap;

            gap: 1rem;

            color: var(--muted);

            font-size: .9rem;

            padding-bottom: 1.5rem;

            margin-bottom: 1.8rem;

            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
        }

        /* CONTENT */
        .note-content {

            font-size: 1.05rem;

            line-height: 2;

            color: #334155;

            white-space: pre-wrap;
        }

        /* TAGS */
        .tags-row {

            margin-top: 2.2rem;

            display: flex;
            gap: .7rem;

            flex-wrap: wrap;
        }

        .tag-chip {

            background: rgba(255, 255, 255, 0.6);

            border: 1px solid rgba(255, 255, 255, 0.8);

            padding: .45rem .9rem;

            border-radius: 50px;

            font-size: .8rem;

            color: var(--muted);

            backdrop-filter: blur(10px);
        }

        /* FOOTER */
        footer {

            text-align: center;

            padding: 1.2rem;

            color: #7c8694;

            font-size: .85rem;
        }

        @media(max-width:768px) {

            .note-body {
                padding: 2rem;
            }

            .note-title {
                font-size: 2rem;
            }

            .top-actions {
                flex-direction: column;
                align-items: stretch;
            }

            .action-group {
                width: 100%;
            }

            .btn-edit,
            .btn-delete {
                flex: 1;
                text-align: center;
            }
        }
    </style>
</head>

<body>

    <nav class="navbar-custom">

        <div class="container">

            <a href="index.html" class="navbar-brand-custom">

                <div class="brand-icon">
                    <i class="bi bi-journal-text"></i>
                </div>

                NoteApp

            </a>

        </div>

    </nav>

    <div class="page-wrapper">

        <div class="content-col">

            <!-- ACTIONS -->
            <div class="top-actions">

                <a href="index.html" class="btn-back">

                    <i class="bi bi-arrow-left me-2"></i>
                    Geri

                </a>

                <div class="action-group">

                    <button class="btn-edit" onclick="goEdit()">

                        <i class="bi bi-pencil-square me-2"></i>
                        Düzenle

                    </button>

                    <button class="btn-delete" onclick="deleteNote()">

                        <i class="bi bi-trash3 me-2"></i>
                        Sil

                    </button>

                </div>

            </div>

            <!-- NOTE -->
            <div class="note-card">

                <div class="note-body">

                    <div class="note-category" id="category">
                        Kategori
                    </div>

                    <div class="note-title" id="title">
                        Yükleniyor...
                    </div>

                    <div class="meta-row" id="meta">

                        <span>Yükleniyor...</span>

                    </div>

                    <div class="note-content" id="content"></div>

                    <div class="tags-row">

                        <span class="tag-chip">note</span>
                        <span class="tag-chip">app</span>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <footer>
        © 2026 NoteApp
    </footer>

    <script>
        const params = new URLSearchParams(window.location.search);
        const noteId = params.get("id");

        async function loadNote() {

            const res = await fetch(`/api/notes/${noteId}`);
            const note = await res.json();

            document.getElementById("title").textContent = note.title;
            document.getElementById("content").textContent = note.content;
            document.getElementById("category").innerHTML = note.category;

            document.getElementById("meta").innerHTML = `
                <span>📅 ${note.createdAt ? new Date(note.createdAt).toLocaleDateString("tr-TR") : ""}</span>
                <span>✏️ ${note.updatedAt ? new Date(note.updatedAt).toLocaleDateString("tr-TR") : ""}</span>
            `;
        }

        function goEdit() {
            window.location.href = `edit-note.html?id=${noteId}`;
        }

        async function deleteNote() {

            await fetch(`/api/notes/${noteId}`, {
                method: "DELETE"
            });

            window.location.href = "index.html";
        }

        loadNote();
    </script>

</body>

</html>
