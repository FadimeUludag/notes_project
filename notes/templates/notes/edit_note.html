<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notu Düzenle</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />

    <style>
        :root {

            --bg: linear-gradient(135deg, #eef3e8 0%, #f7f7f2 100%);

            --card: rgba(255, 255, 255, 0.72);

            --text: #24313d;
            --muted: #7c8694;

            --primary: linear-gradient(135deg, #2ea89b 0%, #9ca87b 100%);

            --shadow:
                0 10px 30px rgba(71, 97, 78, 0.08),
                0 2px 10px rgba(0, 0, 0, 0.04);

            --border: rgba(255, 255, 255, 0.6);
        }

        body {

            background: var(--bg);

            min-height: 100vh;

            font-family: system-ui;

            color: var(--text);

            display: flex;
            align-items: flex-start;
            padding: 40px 20px;
            justify-content: center;

            position: relative;

            overflow: hidden;
            overflow-y: auto;


            padding: 20px;
        }

        /* BACKGROUND EFFECTS */
        body::before,
        body::after {

            content: "";

            position: fixed;

            width: 320px;
            height: 320px;

            border-radius: 50%;

            filter: blur(80px);

            z-index: -1;

            opacity: .35;
        }

        body::before {

            background: #8fd3c7;

            top: -120px;
            left: -100px;
        }

        body::after {

            background: #d8d2a7;

            bottom: -120px;
            right: -100px;
        }

        /* CARD */
        .box {

            width: 100%;
            max-width: 700px;

            background: var(--card);

            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);

            border-radius: 34px;

            border: 1px solid var(--border);

            padding: 32px;

            box-shadow: var(--shadow);

            position: relative;

            overflow: hidden;
        }

        /* GLOW */
        .box::before {

            content: "";

            position: absolute;

            top: -100px;
            right: -100px;

            width: 220px;
            height: 220px;

            background: rgba(143, 211, 199, 0.25);

            border-radius: 50%;

            filter: blur(50px);
        }

        /* ICON */
        .top-icon {

            width: 72px;
            height: 72px;

            border-radius: 24px;

            background: var(--primary);

            display: flex;
            align-items: center;
            justify-content: center;

            color: white;

            font-size: 28px;

            margin-bottom: 25px;

            box-shadow:
                0 10px 25px rgba(46, 168, 155, 0.22);
        }

        /* TITLES */
        .title {

            font-size: 2rem;
            font-weight: 800;

            margin-bottom: 8px;

            color: #1e293b;
        }

        .subtitle {

            color: var(--muted);

            margin-bottom: 35px;
        }

        /* LABELS */
        .form-label {

            font-weight: 700;

            margin-bottom: 10px;

            color: #334155;
        }

        /* INPUTS */
        .form-control {

            border: 1px solid rgba(255, 255, 255, 0.7);

            background: rgba(255, 255, 255, 0.6);

            backdrop-filter: blur(10px);

            border-radius: 18px;

            padding: 15px 18px;

            font-size: 15px;

            color: var(--text);

            box-shadow:
                inset 0 1px 2px rgba(255, 255, 255, 0.3),
                0 4px 10px rgba(0, 0, 0, 0.03);

            transition: .2s ease;
        }

        .form-control:focus {

            border-color: rgba(46, 168, 155, 0.4);

            box-shadow:
                0 0 0 4px rgba(46, 168, 155, 0.12);

            background: rgba(255, 255, 255, 0.85);
        }

        textarea.form-control {
            resize: none;
        }

        /* BUTTONS */
        .btn-main {

            border: none;

            background: var(--primary);

            color: white;

            padding: 15px;

            border-radius: 18px;

            font-size: 1rem;
            font-weight: 700;

            box-shadow:
                0 10px 25px rgba(46, 168, 155, 0.25);

            transition: .25s ease;
        }

        .btn-main:hover {

            transform: translateY(-3px);

            color: white;
        }

        .btn-back {

            background: rgba(255, 255, 255, 0.7);

            border: 1px solid rgba(255, 255, 255, 0.8);

            color: var(--text);

            padding: 15px;

            border-radius: 18px;

            font-weight: 700;

            text-decoration: none;

            backdrop-filter: blur(12px);

            transition: .2s;
        }

        .btn-back:hover {

            background: white;

            color: var(--text);
        }

        /* DELETE */
        .btn-danger-custom {

            border: none;

            background: rgba(255, 107, 107, 0.12);

            color: #d64545;

            border: 1px solid rgba(255, 107, 107, 0.18);

            padding: 15px;

            border-radius: 18px;

            font-weight: 700;

            transition: .2s ease;
        }

        .btn-danger-custom:hover {

            background: rgba(255, 107, 107, 0.2);

            color: #d64545;
        }

        hr {

            margin: 35px 0;

            opacity: .1;
        }

        @media(max-width:768px) {

            .box {
                padding: 28px;
                border-radius: 28px;
            }

            .title {
                font-size: 1.7rem;
            }
        }
    </style>
</head>

<body>

    <div class="box">

        <div class="top-icon">
            <i class="bi bi-pencil-square"></i>
        </div>

        <h1 class="title">
            Notu Düzenle
        </h1>

        <p class="subtitle">
            Notunu güncelle ve düzenli tut ✨
        </p>

        <!-- Django Form -->
        <form method="POST">

            {% csrf_token %}

            <!-- TITLE -->
            <div class="mb-4">

                <label class="form-label">
                    Başlık
                </label>

                <input type="text" name="title" class="form-control" value="{{ note.title }}" required>

            </div>

            <!-- NOTE TYPE -->
            <div class="mb-4">

                <label class="form-label">
                    Not Türü

                </label>

                <div class="d-flex gap-4">

                    <label style="cursor:pointer;">
                        <input type="radio" name="type" value="note" {% if "note" in note.type %}checked{% endif %}
                            onclick="toggleType()">
                        📝 Not
                    </label>

                    <label style="cursor:pointer;">
                        <input type="radio" name="type" value="todo" {% if "todo" in note.type %}checked{% endif %}
                            onclick="toggleType()">
                        ☑️ Görev
                    </label>

                </div>

            </div>
            <!-- NORMAL NOTE -->
            <div class="mb-4" id="contentBox">

                <label class="form-label" id="contentLabel">
                    İçerik
                </label>

                <textarea id="contentField" name="content" class="form-control" rows="6">{{ note.content }}</textarea>

            </div>

            <!-- TODO BOX -->
            <div id="todoBox" class="mb-4" style="display:none;">

                <label class="form-label">
                    Görev Listesi
                </label>

                <div id="todoList">

                    {% for item in note.items.all %}

                    <div class="d-flex gap-2 mb-2 todo-item">

                        <input type="text" name="items[]" class="form-control todo-input" value="{{ item.text }}"
                            placeholder="Görev yaz...">

                    </div>

                    {% empty %}

                    <div class="d-flex gap-2 mb-2 todo-item">

                        <input type="text" name="items[]" class="form-control todo-input" placeholder="Görev yaz...">

                    </div>

                    {% endfor %}

                </div>

                <button type="button" class="btn btn-sm btn-outline-primary mt-2" onclick="addTodo()">
                    + Görev ekle
                </button>

            </div>

            <!-- BUTTONS -->
            <div class="d-flex gap-3">

                <a href="{% url 'home' %}" class="btn-back w-50 text-center">
                    <i class="bi bi-arrow-left me-2"></i>
                    Geri
                </a>

                <button type="submit" class="btn-main w-50">

                    <i class="bi bi-check2-circle me-2"></i>
                    Güncelle

                </button>

            </div>

        </form>

        <hr>

        <!-- DELETE -->
        <form method="POST" action="/api/delete/{{ note.id }}/">

            {% csrf_token %}

            <button class="btn-danger-custom w-100">

                <i class="bi bi-trash3 me-2"></i>
                Notu Sil

            </button>

        </form>

    </div>
    <script>

        function toggleType() {

            let type =
                document.querySelector('input[name="type"]:checked').value;

            let contentBox =
                document.getElementById("contentBox");

            let todoBox =
                document.getElementById("todoBox");

            let contentField =
                document.getElementById("contentField");

            if (type === "todo") {

                contentBox.style.display = "none";

                todoBox.style.display = "block";

                contentField.removeAttribute("required");

            } else {

                contentBox.style.display = "block";

                todoBox.style.display = "none";

                contentField.setAttribute("required", "true");
            }
        }


        function addTodo() {

            let container =
                document.getElementById("todoList");

            let div =
                document.createElement("div");

            div.className =
                "d-flex gap-2 mb-2 todo-item";

            div.innerHTML = `
                <input
                    type="text"
                    name="items[]"
                    class="form-control todo-input"
                    placeholder="Görev yaz..."
                >
            `;

            container.appendChild(div);
        }


        document.addEventListener(
            "DOMContentLoaded",
            toggleType
        );

    </script>

</body>

</html>
